<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Space Collector 🚀</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none;
        }
        
        body {
            background: #0a0a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }
        
        #gameContainer {
            position: relative;
            width: 100%;
            max-width: 500px;
            aspect-ratio: 9/16;
            background: linear-gradient(180deg, #0a0a1a 0%, #1a0a2e 50%, #16213e 100%);
            border: 3px solid #00d4ff;
            border-radius: 10px;
            box-shadow: 
                0 0 30px rgba(0, 212, 255, 0.3),
                inset 0 0 50px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }
        
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        
        .ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        .score-display {
            position: absolute;
            top: 15px;
            left: 15px;
            color: #00d4ff;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 10px #00d4ff, 0 0 20px #00d4ff;
            pointer-events: none;
        }
        
        .time-display {
            position: absolute;
            top: 15px;
            right: 15px;
            color: #ff00ff;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 10px #ff00ff, 0 0 20px #ff00ff;
            pointer-events: none;
        }
        
        .round-display {
            position: absolute;
            top: 50px;
            left: 50%;
            transform: translateX(-50%);
            color: #ffd700;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 0 0 10px #ffd700;
            pointer-events: none;
        }
        
        .combo-display {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            color: #ff3366;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 0 0 10px #ff3366;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        
        .combo-display.active {
            opacity: 1;
            animation: comboPulse 0.5s ease-in-out;
        }
        
        @keyframes comboPulse {
            0%, 100% { transform: translateX(-50%) scale(1); }
            50% { transform: translateX(-50%) scale(1.3); }
        }
        
        .powerup-indicator {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            pointer-events: none;
        }
        
        .powerup-icon {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            opacity: 0.3;
            transition: opacity 0.3s, transform 0.3s;
        }
        
        .powerup-icon.active {
            opacity: 1;
            transform: scale(1.2);
            animation: powerupGlow 1s ease-in-out infinite;
        }
        
        @keyframes powerupGlow {
            0%, 100% { box-shadow: 0 0 10px currentColor; }
            50% { box-shadow: 0 0 25px currentColor, 0 0 40px currentColor; }
        }
        
        .shield-icon { background: #00ff88; color: #00ff88; }
        .speed-icon { background: #00d4ff; color: #00d4ff; }
        .multiplier-icon { background: #ffd700; color: #ffd700; }
        
        .start-screen, .game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 26, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            pointer-events: auto;
        }
        
        .game-title {
            font-size: 36px;
            font-weight: bold;
            background: linear-gradient(90deg, #00d4ff, #ff00ff, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: none;
            margin-bottom: 10px;
            animation: titleGlow 2s ease-in-out infinite;
        }
        
        @keyframes titleGlow {
            0%, 100% { filter: drop-shadow(0 0 10px rgba(0, 212, 255, 0.5)); }
            50% { filter: drop-shadow(0 0 30px rgba(255, 0, 255, 0.8)); }
        }
        
        .game-subtitle {
            color: #888;
            font-size: 14px;
            margin-bottom: 30px;
        }
        
        .high-score {
            color: #ffd700;
            font-size: 18px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #ffd700;
        }
        
        .btn {
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            background: linear-gradient(135deg, #00d4ff, #0088cc);
            border: none;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
            font-family: inherit;
        }
        
        .btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.8);
        }
        
        .btn:active {
            transform: scale(0.95);
        }
        
        .controls-hint {
            margin-top: 30px;
            color: #666;
            font-size: 12px;
            text-align: center;
            line-height: 1.6;
        }
        
        .final-score {
            font-size: 48px;
            color: #00d4ff;
            text-shadow: 0 0 20px #00d4ff;
            margin-bottom: 10px;
        }
        
        .warp-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, transparent 0%, rgba(0, 212, 255, 0.3) 50%, rgba(0, 212, 255, 0.8) 100%);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        
        .warp-overlay.active {
            opacity: 1;
            animation: warpSpeed 3s ease-out;
        }
        
        @keyframes warpSpeed {
            0% { transform: scale(0.8); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: scale(2); opacity: 0; }
        }
        
        .touch-zones {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100px;
            display: flex;
            pointer-events: auto;
        }
        
        .touch-zone {
            flex: 1;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .touch-zone:active {
            background: rgba(0, 212, 255, 0.1);
        }
        
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        
        <div class="warp-overlay" id="warpOverlay"></div>
        
        <div class="ui-overlay">
            <div class="score-display">Score: <span id="score">0</span></div>
            <div class="time-display">Time: <span id="time">30</span></div>
            <div class="round-display">Round <span id="round">1</span></div>
            <div class="combo-display" id="comboDisplay">COMBO x<span id="combo">0</span>!</div>
            
            <div class="powerup-indicator">
                <div class="powerup-icon shield-icon" id="shieldIcon" title="Shield"></div>
                <div class="powerup-icon speed-icon" id="speedIcon" title="Speed"></div>
                <div class="powerup-icon multiplier-icon" id="multiplierIcon" title="Multiplier"></div>
            </div>
        </div>
        
        <div class="touch-zones" id="touchZones">
            <div class="touch-zone" id="leftZone"></div>
            <div class="touch-zone" id="rightZone"></div>
        </div>
        
        <div class="start-screen" id="startScreen">
            <div class="game-title">🚀 SPACE COLLECTOR 🚀</div>
            <div class="game-subtitle">Collect stars, avoid asteroids!</div>
            <div class="high-score">High Score: <span id="highScoreDisplay">0</span></div>
            <button class="btn" id="startBtn">LAUNCH</button>
            <div class="controls-hint">
                Tap LEFT / RIGHT to move<br>
                Collect ⭐ coins and power-ups<br>
                Avoid 💥 asteroids!
            </div>
        </div>
        
        <div class="game-over-screen hidden" id="gameOverScreen">
            <div class="game-title">MISSION COMPLETE</div>
            <div class="final-score" id="finalScore">0</div>
            <div class="high-score">High Score: <span id="finalHighScore">0</span></div>
            <button class="btn" id="restartBtn">FLY AGAIN</button>
        </div>
    </div>

    <script>
        // Game Configuration
        const CONFIG = {
            roundDuration: 30,
            spawnRate: 800,
            minSpawnRate: 300,
            playerSpeed: 8,
            boostedSpeed: 14,
            gravity: 2,
            bossInterval: 10000,
            comboTimeout: 1500
        };

        // Game State
        let canvas, ctx;
        let gameState = 'start';
        let score = 0;
        let highScore = localStorage.getItem('spaceCollectorHighScore') || 0;
        let round = 1;
        let timeLeft = CONFIG.roundDuration;
        let lastTime = 0;
        let spawnTimer = 0;
        let bossTimer = 0;
        let gameTime = 0;
        
        // Player
        let player = {
            x: 0,
            y: 0,
            width: 50,
            height: 60,
            vx: 0,
            targetX: 0,
            angle: 0,
            shield: false,
            speedBoost: false,
            multiplier: false,
            shieldTime: 0,
            speedTime: 0,
            multiplierTime: 0
        };
        
        // Game Objects
        let items = [];
        let particles = [];
        let stars = [];
        let nebulas = [];
        let combo = 0;
        let comboTimer = 0;
        let warpActive = false;
        
        // Audio Context
        let audioCtx = null;
        
        // Initialize
        function init() {
            canvas = document.getElementById('gameCanvas');
            ctx = canvas.getContext('2d');
            resizeCanvas();
            
            // Set player position
            player.x = canvas.width / 2;
            player.y = canvas.height - 100;
            player.targetX = player.x;
            
            // Create background elements
            createStars();
            createNebulas();
            
            // Event Listeners
            window.addEventListener('resize', resizeCanvas);
            document.getElementById('startBtn').addEventListener('click', startGame);
            document.getElementById('restartBtn').addEventListener('click', startGame);
            
            // Touch controls
            document.getElementById('leftZone').addEventListener('touchstart', (e) => { e.preventDefault(); moveLeft(); });
            document.getElementById('rightZone').addEventListener('touchstart', (e) => { e.preventDefault(); moveRight(); });
            document.getElementById('leftZone').addEventListener('mousedown', moveLeft);
            document.getElementById('rightZone').addEventListener('mousedown', moveRight);
            
            // Keyboard controls
            window.addEventListener('keydown', handleKeyDown);
            
            // Update high score display
            document.getElementById('highScoreDisplay').textContent = highScore;
            
            // Start loop
            requestAnimationFrame(gameLoop);
        }
        
        function resizeCanvas() {
            const container = document.getElementById('gameContainer');
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            player.y = canvas.height - 100;
        }
        
        function createStars() {
            stars = [];
            for (let i = 0; i < 100; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2 + 0.5,
                    speed: Math.random() * 0.5 + 0.1,
                    brightness: Math.random(),
                    twinkleSpeed: Math.random() * 0.05 + 0.02
                });
            }
        }
        
        function createNebulas() {
            nebulas = [];
            for (let i = 0; i < 5; i++) {
                nebulas.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    radius: Math.random() * 100 + 50,
                    color: `hsla(${Math.random() * 60 + 240}, 70%, 50%, 0.1)`,
                    speed: Math.random() * 0.2 + 0.05
                });
            }
        }
        
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }
        
        function playSound(type) {
            if (!audioCtx) return;
            
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            switch(type) {
                case 'collect':
                    oscillator.frequency.setValueAtTime(800, audioCtx.currentTime);
                    oscillator.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
                    gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                    oscillator.start(audioCtx.currentTime);
                    oscillator.stop(audioCtx.currentTime + 0.1);
                    break;
                case 'coin':
                    oscillator.frequency.setValueAtTime(1200, audioCtx.currentTime);
                    oscillator.frequency.exponentialRampToValueAtTime(1600, audioCtx.currentTime + 0.15);
                    gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
                    oscillator.start(audioCtx.currentTime);
                    oscillator.stop(audioCtx.currentTime + 0.15);
                    break;
                case 'powerup':
                    oscillator.type = 'sawtooth';
                    oscillator.frequency.setValueAtTime(400, audioCtx.currentTime);
                    oscillator.frequency.linearRampToValueAtTime(800, audioCtx.currentTime + 0.3);
                    gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                    gainNode.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                    oscillator.start(audioCtx.currentTime);
                    oscillator.stop(audioCtx.currentTime + 0.3);
                    break;
                case 'hit':
                    oscillator.type = 'square';
                    oscillator.frequency.setValueAtTime(200, audioCtx.currentTime);
                    oscillator.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.2);
                    gainNode.gain.setValueAtTime(0.4, audioCtx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                    oscillator.start(audioCtx.currentTime);
                    oscillator.stop(audioCtx.currentTime + 0.2);
                    break;
                case 'boss':
                    oscillator.type = 'sawtooth';
                    oscillator.frequency.setValueAtTime(150, audioCtx.currentTime);
                    oscillator.frequency.linearRampToValueAtTime(100, audioCtx.currentTime + 0.5);
                    gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
                    gainNode.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                    oscillator.start(audioCtx.currentTime);
                    oscillator.stop(audioCtx.currentTime + 0.5);
                    break;
            }
        }
        
        function moveLeft() {
            if (gameState !== 'playing') return;
            player.targetX = Math.max(player.width/2, player.x - 80);
        }
        
        function moveRight() {
            if (gameState !== 'playing') return;
            player.targetX = Math.min(canvas.width - player.width/2, player.x + 80);
        }
        
        function handleKeyDown(e) {
            if (gameState !== 'playing') return;
            if (e.key === 'ArrowLeft' || e.key === 'a') moveLeft();
            if (e.key === 'ArrowRight' || e.key === 'd') moveRight();
        }
        
        function startGame() {
            initAudio();
            if (audioCtx && audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            
            gameState = 'playing';
            score = 0;
            round = 1;
            timeLeft = CONFIG.roundDuration;
            items = [];
            particles = [];
            combo = 0;
            comboTimer = 0;
            warpActive = false;
            
            player.x = canvas.width / 2;
            player.targetX = player.x;
            player.shield = false;
            player.speedBoost = false;
            player.multiplier = false;
            player.shieldTime = 0;
            player.speedTime = 0;
            player.multiplierTime = 0;
            
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.add('hidden');
            document.getElementById('touchZones').style.display = 'flex';
            
            lastTime = performance.now();
            gameTime = 0;
        }
        
        function gameOver() {
            gameState = 'gameover';
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('spaceCollectorHighScore', highScore);
            }
            
            document.getElementById('finalScore').textContent = score;
            document.getElementById('finalHighScore').textContent = highScore;
            document.getElementById('gameOverScreen').classList.remove('hidden');
            document.getElementById('touchZones').style.display = 'none';
        }
        
        function spawnItem() {
            const types = ['star', 'coin', 'coin', 'star', 'asteroid', 'asteroid', 'debris'];
            
            // Power-up spawn chance
            if (Math.random() < 0.08) {
                types.push('shield', 'speed', 'multiplier');
            }
            
            const type = types[Math.floor(Math.random() * types.length)];
            
            let item = {
                x: Math.random() * (canvas.width - 40) + 20,
                y: -50,
                type: type,
                width: 30,
                height: 30,
                vy: Math.random() * 2 + CONFIG.gravity + (round * 0.5),
                rotation: 0,
                rotationSpeed: (Math.random() - 0.5) * 0.1
            };
            
            if (type === 'asteroid') {
                item.width = 45;
                item.height = 45;
                item.vy += 1;
            } else if (type === 'debris') {
                item.width = 25;
                item.height = 25;
                item.vy += 0.5;
            } else if (type === 'coin') {
                item.width = 35;
                item.height = 35;
            }
            
            items.push(item);
        }
        
        function spawnBoss() {
            playSound('boss');
            items.push({
                x: Math.random() * (canvas.width - 100) + 50,
                y: -100,
                type: 'boss',
                width: 80,
                height: 80,
                vy: 1.5 + (round * 0.3),
                rotation: 0,
                rotationSpeed: 0.02,
                health: 3
            });
        }
        
        function createParticles(x, y, color, count = 8) {
            for (let i = 0; i < count; i++) {
                const angle = (Math.PI * 2 / count) * i + Math.random() * 0.5;
                particles.push({
                    x: x,
                    y: y,
                    vx: Math.cos(angle) * (Math.random() * 4 + 2),
                    vy: Math.sin(angle) * (Math.random() * 4 + 2),
                    life: 1,
                    decay: Math.random() * 0.03 + 0.02,
                    color: color,
                    size: Math.random() * 4 + 2
                });
            }
        }
        
        function createCollectionEffect(x, y, type) {
            const colors = {
                star: '#00d4ff',
                coin: '#ffd700',
                shield: '#00ff88',
                speed: '#ff00ff',
                multiplier: '#ffaa00'
            };
            createParticles(x, y, colors[type] || '#ffffff', 12);
        }
        
        function activatePowerup(type) {
            const now = Date.now();
            
            switch(type) {
                case 'shield':
                    player.shield = true;
                    player.shieldTime = now + 5000;
                    document.getElementById('shieldIcon').classList.add('active');
                    break;
                case 'speed':
                    player.speedBoost = true;
                    player.speedTime = now + 5000;
                    document.getElementById('speedIcon').classList.add('active');
                    activateWarp();
                    break;
                case 'multiplier':
                    player.multiplier = true;
                    player.multiplierTime = now + 5000;
                    document.getElementById('multiplierIcon').classList.add('active');
                    break;
            }
            
            playSound('powerup');
        }
        
        function activateWarp() {
            warpActive = true;
            document.getElementById('warpOverlay').classList.add('active');
            setTimeout(() => {
                warpActive = false;
                document.getElementById('warpOverlay').classList.remove('active');
            }, 3000);
        }
        
        function update(dt) {
            if (gameState !== 'playing') return;
            
            const now = Date.now();
            gameTime += dt;
            
            // Timer
            timeLeft -= dt / 1000;
            if (timeLeft <= 0) {
                timeLeft = CONFIG.roundDuration;
                round++;
                document.getElementById('round').textContent = round;
            }
            
            // Update displays
            document.getElementById('score').textContent = score;
            document.getElementById('time').textContent = Math.ceil(timeLeft);
            
            // Player movement
            const speed = player.speedBoost ? CONFIG.boostedSpeed : CONFIG.playerSpeed;
            const dx = player.targetX - player.x;
            player.x += dx * 0.15;
            player.angle = dx * 0.005;
            
            // Powerup timers
            if (player.shield && now > player.shieldTime) {
                player.shield = false;
                document.getElementById('shieldIcon').classList.remove('active');
            }
            if (player.speedBoost && now > player.speedTime) {
                player.speedBoost = false;
                document.getElementById('speedIcon').classList.remove('active');
            }
            if (player.multiplier && now > player.multiplierTime) {
                player.multiplier = false;
                document.getElementById('multiplierIcon').classList.remove('active');
            }
            
            // Combo timer
            if (combo > 0) {
                comboTimer -= dt;
                if (comboTimer <= 0) {
                    combo = 0;
                    document.getElementById('comboDisplay').classList.remove('active');
                }
            }
            
            // Spawn items
            spawnTimer += dt;
            const currentSpawnRate = Math.max(CONFIG.minSpawnRate, CONFIG.spawnRate - (round * 50));
            if (spawnTimer > currentSpawnRate) {
                spawnItem();
                spawnTimer = 0;
            }
            
            // Boss spawn
            bossTimer += dt;
            if (bossTimer > CONFIG.bossInterval) {
                spawnBoss();
                bossTimer = 0;
            }
            
            // Update items
            for (let i = items.length - 1; i >= 0; i--) {
                const item = items[i];
                item.y += item.vy * (warpActive ? 3 : 1);
                item.rotation += item.rotationSpeed;
                
                // Collision detection
                const dx = player.x - item.x;
                const dy = player.y - item.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist < (player.width/2 + item.width/2)) {
                    if (item.type === 'asteroid' || item.type === 'debris' || item.type === 'boss') {
                        if (player.shield) {
                            player.shield = false;
                            document.getElementById('shieldIcon').classList.remove('active');
                            createParticles(item.x, item.y, '#00ff88', 15);
                            items.splice(i, 1);
                            playSound('hit');
                        } else {
                            createParticles(player.x, player.y, '#ff3366', 20);
                            gameOver();
                            return;
                        }
                    } else {
                        // Collection
                        let points = 0;
                        switch(item.type) {
                            case 'star': points = 10; break;
                            case 'coin': points = 25; break;
                            case 'shield':
                            case 'speed':
                            case 'multiplier':
                                activatePowerup(item.type);
                                points = 50;
                                break;
                        }
                        
                        // Combo system
                        combo++;
                        comboTimer = CONFIG.comboTimeout;
                        const comboMultiplier = 1 + (combo * 0.1);
                        const powerupMultiplier = player.multiplier ? 2 : 1;
                        points = Math.floor(points * comboMultiplier * powerupMultiplier);
                        
                        score += points;
                        
                        if (combo > 1) {
                            document.getElementById('combo').textContent = combo;
                            document.getElementById('comboDisplay').classList.add('active');
                        }
                        
                        createCollectionEffect(item.x, item.y, item.type);
                        playSound(item.type === 'coin' ? 'coin' : 'collect');
                        items.splice(i, 1);
                    }
                    continue;
                }
                
                // Remove off-screen items
                if (item.y > canvas.height + 100) {
                    items.splice(i, 1);
                }
            }
            
            // Update particles
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life -= p.decay;
                p.vy += 0.1;
                
                if (p.life <= 0) {
                    particles.splice(i, 1);
                }
            }
            
            // Update stars (parallax)
            stars.forEach(star => {
                star.y += star.speed * (warpActive ? 20 : 1);
                star.brightness += star.twinkleSpeed;
                if (star.brightness > 1) star.brightness = 0;
                if (star.y > canvas.height) {
                    star.y = 0;
                    star.x = Math.random() * canvas.width;
                }
            });
            
            // Update nebulas
            nebulas.forEach(nebula => {
                nebula.y += nebula.speed * (warpActive ? 5 : 1);
                if (nebula.y > canvas.height + nebula.radius) {
                    nebula.y = -nebula.radius;
                    nebula.x = Math.random() * canvas.width;
                }
            });
        }
        
        function draw() {
            // Clear with gradient
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#0a0a1a');
            gradient.addColorStop(0.5, '#1a0a2e');
            gradient.addColorStop(1, '#16213e');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw nebulas
            nebulas.forEach(nebula => {
                const grad = ctx.createRadialGradient(
                    nebula.x, nebula.y, 0,
                    nebula.x, nebula.y, nebula.radius
                );
                grad.addColorStop(0, nebula.color);
                grad.addColorStop(1, 'transparent');
                ctx.fillStyle = grad;
                ctx.fillRect(nebula.x - nebula.radius, nebula.y - nebula.radius, 
                           nebula.radius * 2, nebula.radius * 2);
            });
            
            // Draw stars
            stars.forEach(star => {
                const brightness = 0.5 + Math.sin(star.brightness * Math.PI * 2) * 0.5;
                ctx.fillStyle = `rgba(255, 255, 255, ${brightness})`;
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();
                
                // Glow for larger stars
                if (star.size > 1.5) {
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = 'white';
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }
            });
            
            // Draw particles
            particles.forEach(p => {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.globalAlpha = 1;
            });
            
            // Draw items
            items.forEach(item => {
                ctx.save();
                ctx.translate(item.x, item.y);
                ctx.rotate(item.rotation);
                
                switch(item.type) {
                    case 'star':
                        drawStar(0, 0, 5, item.width/2, item.width/4, '#00d4ff');
                        break;
                    case 'coin':
                        drawCoin(0, 0, item.width/2);
                        break;
                    case 'asteroid':
                        drawAsteroid(0, 0, item.width/2);
                        break;
                    case 'debris':
                        drawDebris(0, 0, item.width/2);
                        break;
                    case 'boss':
                        drawBoss(0, 0, item.width/2);
                        break;
                    case 'shield':
                        drawPowerup(0, 0, '#00ff88', '🛡️');
                        break;
                    case 'speed':
                        drawPowerup(0, 0, '#ff00ff', '⚡');
                        break;
                    case 'multiplier':
                        drawPowerup(0, 0, '#ffd700', '×2');
                        break;
                }
                
                ctx.restore();
            });
            
            // Draw player
            drawPlayer();
        }
        
        function drawPlayer() {
            ctx.save();
            ctx.translate(player.x, player.y);
            ctx.rotate(player.angle);
            
            // Shield effect
            if (player.shield) {
                ctx.beginPath();
                ctx.arc(0, 0, player.width/2 + 10, 0, Math.PI * 2);
                ctx.strokeStyle = '#00ff88';
                ctx.lineWidth = 3;
                ctx.shadowBlur = 20;
                ctx.shadowColor = '#00ff88';
                ctx.stroke();
                ctx.shadowBlur = 0;
            }
            
            // Thruster flame
            const flameHeight = 20 + Math.random() * 15;
            const flameGradient = ctx.createLinearGradient(0, player.height/2, 0, player.height/2 + flameHeight);
            flameGradient.addColorStop(0, '#00d4ff');
            flameGradient.addColorStop(0.5, '#0088ff');
            flameGradient.addColorStop(1, 'transparent');
            
            ctx.fillStyle = flameGradient;
            ctx.beginPath();
            ctx.moveTo(-10, player.height/2);
            ctx.lineTo(0, player.height/2 + flameHeight);
            ctx.lineTo(10, player.height/2);
            ctx.closePath();
            ctx.fill();
            
            // Warp effect
            if (warpActive) {
                ctx.strokeStyle = '#ff00ff';
                ctx.lineWidth = 2;
                for (let i = 0; i < 5; i++) {
                    ctx.beginPath();
                    ctx.arc(0, 0, player.width + i * 10, 0, Math.PI * 2);
                    ctx.stroke();
                }
            }
            
            // Spaceship body
            ctx.fillStyle = '#1a1a2e';
            ctx.strokeStyle = '#00d4ff';
            ctx.lineWidth = 2;
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#00d4ff';
            
            // Main body
            ctx.beginPath();
            ctx.moveTo(0, -player.height/2);
            ctx.lineTo(player.width/2, player.height/2);
            ctx.lineTo(0, player.height/2 - 10);
            ctx.lineTo(-player.width/2, player.height/2);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();
            
            // Cockpit
            ctx.fillStyle = '#00d4ff';
            ctx.beginPath();
            ctx.ellipse(0, -5, 8, 12, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Wing details
            ctx.strokeStyle = '#ff00ff';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(-player.width/2, player.height/2 - 5);
            ctx.lineTo(-player.width/2 - 5, player.height/2 + 5);
            ctx.moveTo(player.width/2, player.height/2 - 5);
            ctx.lineTo(player.width/2 + 5, player.height/2 + 5);
            ctx.stroke();
            
            ctx.shadowBlur = 0;
            ctx.restore();
        }
        
        function drawStar(cx, cy, spikes, outerRadius, innerRadius, color) {
            let rot = Math.PI / 2 * 3;
            let x = cx;
            let y = cy;
            let step = Math.PI / spikes;
            
            ctx.beginPath();
            ctx.moveTo(cx, cy - outerRadius);
            for (let i = 0; i < spikes; i++) {
                x = cx + Math.cos(rot) * outerRadius;
                y = cy + Math.sin(rot) * outerRadius;
                ctx.lineTo(x, y);
                rot += step;
                
                x = cx + Math.cos(rot) * innerRadius;
                y = cy + Math.sin(rot) * innerRadius;
                ctx.lineTo(x, y);
                rot += step;
            }
            ctx.lineTo(cx, cy - outerRadius);
            ctx.closePath();
            
            ctx.fillStyle = color;
            ctx.shadowBlur = 15;
            ctx.shadowColor = color;
            ctx.fill();
            ctx.shadowBlur = 0;
        }
        
        function drawCoin(x, y, r) {
            ctx.beginPath();
            ctx.arc(x, y, r, 0, Math.PI * 2);
            ctx.fillStyle = '#ffd700';
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#ffd700';
            ctx.fill();
            
            ctx.strokeStyle = '#ffaa00';
            ctx.lineWidth = 2;
            ctx.stroke();
            
            ctx.fillStyle = '#ffaa00';
            ctx.font = 'bold 16px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('$', x, y + 1);
            ctx.shadowBlur = 0;
        }
        
        function drawAsteroid(x, y, r) {
            ctx.fillStyle = '#4a4a5a';
            ctx.strokeStyle = '#6a6a7a';
            ctx.lineWidth = 2;
            ctx.shadowBlur = 5;
            ctx.shadowColor = '#ff3366';
            
            ctx.beginPath();
            for (let i = 0; i < 8; i++) {
                const angle = (i / 8) * Math.PI * 2;
                const radius = r * (0.7 + Math.random() * 0.3);
                const px = x + Math.cos(angle) * radius;
                const py = y + Math.sin(angle) * radius;
                if (i === 0) ctx.moveTo(px, py);
                else ctx.lineTo(px, py);
            }
            ctx.closePath();
            ctx.fill();
            ctx.stroke();
            ctx.shadowBlur = 0;
            
            // Craters
            ctx.fillStyle = '#3a3a4a';
            ctx.beginPath();
            ctx.arc(x - r*0.3, y - r*0.2, r*0.2, 0, Math.PI*2);
            ctx.fill();
        }
        
        function drawDebris(x, y, r) {
            ctx.fillStyle = '#5a5a6a';
            ctx.strokeStyle = '#7a7a8a';
            ctx.lineWidth = 1;
            
            ctx.beginPath();
            ctx.moveTo(x - r, y - r);
            ctx.lineTo(x + r*0.5, y - r*0.8);
            ctx.lineTo(x + r, y + r*0.3);
            ctx.lineTo(x, y + r);
            ctx.lineTo(x - r*0.8, y + r*0.5);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();
        }
        
        function drawBoss(x, y, r) {
            // Glow
            ctx.shadowBlur = 30;
            ctx.shadowColor = '#ff0000';
            
            // Main body
            ctx.fillStyle = '#2a0a0a';
            ctx.strokeStyle = '#ff0000';
            ctx.lineWidth = 3;
            
            ctx.beginPath();
            ctx.arc(x, y, r, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
            
            // Eyes
            ctx.fillStyle = '#ff0000';
            ctx.beginPath();
            ctx.arc(x - r*0.3, y - r*0.2, r*0.2, 0, Math.PI*2);
            ctx.arc(x + r*0.3, y - r*0.2, r*0.2, 0, Math.PI*2);
            ctx.fill();
            
            // Spikes
            for (let i = 0; i < 8; i++) {
                const angle = (i / 8) * Math.PI * 2;
                ctx.beginPath();
                ctx.moveTo(x + Math.cos(angle) * r, y + Math.sin(angle) * r);
                ctx.lineTo(x + Math.cos(angle) * (r + 15), y + Math.sin(angle) * (r + 15));
                ctx.strokeStyle = '#ff0000';
                ctx.lineWidth = 3;
                ctx.stroke();
            }
            
            ctx.shadowBlur = 0;
        }
        
        function drawPowerup(x, y, color, symbol) {
            ctx.fillStyle = color;
            ctx.shadowBlur = 20;
            ctx.shadowColor = color;
            
            ctx.beginPath();
            ctx.arc(x, y, 15, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = '#000';
            ctx.font = 'bold 16px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(symbol, x, y);
            
            // Ring
            ctx.strokeStyle = color;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(x, y, 20, 0, Math.PI * 2);
            ctx.stroke();
            
            ctx.shadowBlur = 0;
        }
        
        function gameLoop(currentTime) {
            const dt = currentTime - lastTime;
            lastTime = currentTime;
            
            update(dt);
            draw();
            
            requestAnimationFrame(gameLoop);
        }
        
        // Start initialization
        window.addEventListener('load', init);
    </script>
</body>
</html>
