<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🧠 Memory Match</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 10px;
            overflow-x: hidden;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 10px;
        }
        
        h1 {
            font-size: 1.8rem;
            margin-bottom: 5px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .stats {
            display: flex;
            gap: 20px;
            font-size: 1rem;
            background: rgba(255,255,255,0.2);
            padding: 8px 20px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }
        
        .stat {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .game-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            max-width: 360px;
            width: 100%;
            margin: 10px 0;
        }
        
        .card {
            aspect-ratio: 1;
            background: linear-gradient(145deg, #ffffff, #e6e6e6);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            position: relative;
            overflow: hidden;
        }
        
        .card::before {
            content: "❓";
            position: absolute;
            font-size: 2rem;
            transition: opacity 0.3s;
        }
        
        .card.flipped::before {
            opacity: 0;
        }
        
        .card.flipped {
            background: linear-gradient(145deg, #ff6b6b, #ee5a5a);
            transform: rotateY(180deg);
        }
        
        .card.matched {
            background: linear-gradient(145deg, #51cf66, #40c057);
            animation: pulse 0.5s ease;
            pointer-events: none;
        }
        
        .card.shake {
            animation: shake 0.5s ease;
        }
        
        @keyframes pulse {
            0%, 100% { transform: rotateY(180deg) scale(1); }
            50% { transform: rotateY(180deg) scale(1.1); }
        }
        
        @keyframes shake {
            0%, 100% { transform: rotateY(180deg) translateX(0); }
            25% { transform: rotateY(180deg) translateX(-5px); }
            75% { transform: rotateY(180deg) translateX(5px); }
        }
        
        .card-content {
            opacity: 0;
            transform: rotateY(180deg);
            transition: opacity 0.3s;
        }
        
        .card.flipped .card-content,
        .card.matched .card-content {
            opacity: 1;
        }
        
        .controls {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        
        button {
            background: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: bold;
            color: #667eea;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        button:active {
            transform: scale(0.95);
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        
        .high-score {
            color: white;
            font-size: 0.9rem;
            margin-top: 10px;
            opacity: 0.9;
        }
        
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }
        
        .modal.show {
            display: flex;
        }
        
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            max-width: 300px;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        
        .modal h2 {
            color: #667eea;
            margin-bottom: 15px;
        }
        
        .modal p {
            color: #666;
            margin-bottom: 20px;
            font-size: 1.1rem;
        }
        
        .modal button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        
        @media (max-width: 400px) {
            .game-board {
                gap: 8px;
            }
            
            .card {
                font-size: 2rem;
            }
            
            .card::before {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🧠 Memory Match</h1>
        <div class="stats">
            <div class="stat">
                <span>⏱️</span>
                <span id="time">0s</span>
            </div>
            <div class="stat">
                <span>👣</span>
                <span id="moves">0</span>
            </div>
            <div class="stat">
                <span>⭐</span>
                <span id="score">0</span>
            </div>
        </div>
    </div>
    
    <div class="game-board" id="gameBoard"></div>
    
    <div class="controls">
        <button onclick="initGame()">🔄 New Game</button>
    </div>
    
    <div class="high-score" id="highScore">🏆 Best: --</div>
    
    <div class="modal" id="winModal">
        <div class="modal-content">
            <h2>🎉 You Won!</h2>
            <p id="winStats"></p>
            <button onclick="initGame(); hideModal()">Play Again</button>
        </div>
    </div>
    
    <script>
        const emojis = ['🎮', '🎯', '🎲', '🎪', '🎨', '🎭', '🎸', '🎺'];
        let cards = [];
        let flippedCards = [];
        let matchedPairs = 0;
        let moves = 0;
        let score = 0;
        let time = 0;
        let timerInterval;
        let isLocked = false;
        
        function getHighScore() {
            return localStorage.getItem('memoryMatchHighScore') || 0;
        }
        
        function saveHighScore(newScore) {
            const currentHigh = getHighScore();
            if (newScore > currentHigh) {
                localStorage.setItem('memoryMatchHighScore', newScore);
                return true;
            }
            return false;
        }
        
        function updateHighScoreDisplay() {
            const highScore = getHighScore();
            document.getElementById('highScore').textContent = 
                highScore > 0 ? `🏆 Best: ${highScore} pts` : '🏆 Best: --';
        }
        
        function createCard(emoji, index) {
            const card = document.createElement('div');
            card.className = 'card';
            card.dataset.emoji = emoji;
            card.dataset.index = index;
            card.innerHTML = `<span class="card-content">${emoji}</span>`;
            card.addEventListener('click', () => flipCard(card));
            return card;
        }
        
        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }
        
        function initGame() {
            clearInterval(timerInterval);
            time = 0;
            moves = 0;
            score = 0;
            matchedPairs = 0;
            flippedCards = [];
            isLocked = false;
            
            document.getElementById('time').textContent = '0s';
            document.getElementById('moves').textContent = '0';
            document.getElementById('score').textContent = '0';
            
            cards = [...emojis, ...emojis];
            shuffle(cards);
            
            const board = document.getElementById('gameBoard');
            board.innerHTML = '';
            cards.forEach((emoji, index) => {
                board.appendChild(createCard(emoji, index));
            });
            
            timerInterval = setInterval(() => {
                time++;
                document.getElementById('time').textContent = time + 's';
            }, 1000);
            
            updateHighScoreDisplay();
        }
        
        function flipCard(card) {
            if (isLocked || card.classList.contains('flipped') || 
                card.classList.contains('matched')) return;
            
            card.classList.add('flipped');
            flippedCards.push(card);
            
            if (flippedCards.length === 2) {
                moves++;
                document.getElementById('moves').textContent = moves;
                checkMatch();
            }
        }
        
        function checkMatch() {
            isLocked = true;
            const [card1, card2] = flippedCards;
            const match = card1.dataset.emoji === card2.dataset.emoji;
            
            if (match) {
                setTimeout(() => {
                    card1.classList.add('matched');
                    card2.classList.add('matched');
                    matchedPairs++;
                    score += 100 + Math.max(0, 50 - time);
                    document.getElementById('score').textContent = score;
                    flippedCards = [];
                    isLocked = false;
                    
                    if (matchedPairs === emojis.length) {
                        endGame();
                    }
                }, 500);
            } else {
                setTimeout(() => {
                    card1.classList.add('shake');
                    card2.classList.add('shake');
                }, 400);
                
                setTimeout(() => {
                    card1.classList.remove('flipped', 'shake');
                    card2.classList.remove('flipped', 'shake');
                    flippedCards = [];
                    isLocked = false;
                }, 800);
            }
        }
        
        function endGame() {
            clearInterval(timerInterval);
            const isNewHigh = saveHighScore(score);
            
            let stars = '⭐';
            if (moves <= 12) stars = '⭐⭐⭐';
            else if (moves <= 16) stars = '⭐⭐';
            
            const stats = `
                Time: ${time}s | Moves: ${moves}<br>
                Score: ${score} ${stars}<br>
                ${isNewHigh ? '🎉 NEW HIGH SCORE!' : ''}
            `;
            
            document.getElementById('winStats').innerHTML = stats;
            document.getElementById('winModal').classList.add('show');
            updateHighScoreDisplay();
        }
        
        function hideModal() {
            document.getElementById('winModal').classList.remove('show');
        }
        
        // Initialize on load
        updateHighScoreDisplay();
        initGame();
    </script>
</body>
</html>
